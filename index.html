<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>گالری موبایل</title>
  <style>
    /* ===== RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }
    body {
      background: #f5f7fa;
      color: #1e293b;
      padding: 0;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .hidden {
      display: none !important;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 10;
      min-height: 56px;
    }
    .header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 0;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search-box {
      padding: 6px 12px;
      border-radius: 30px;
      border: 1px solid #cbd5e1;
      width: 120px;
      background: #fff;
      font-size: 0.85rem;
      transition: 0.2s;
    }
    .search-box:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
      width: 140px;
    }
    .hamburger {
      font-size: 1.8rem;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0 4px;
      color: #1e293b;
      line-height: 1;
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #e2e8f0;
      background: #cbd5e1;
      flex-shrink: 0;
    }

    /* ===== GALLERY GRID ===== */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 6px;
      flex: 1;
    }
    .photo-card {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      aspect-ratio: 1 / 1;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
      transition: 0.1s;
    }
    .photo-card:active {
      transform: scale(0.97);
    }
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #e2e8f0;
    }
    .photo-card .photo-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 4px 6px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.5));
      color: #fff;
      font-size: 0.7rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }
    .photo-card .pin-badge {
      position: absolute;
      top: 4px;
      left: 4px;
      background: rgba(239, 68, 68, 0.85);
      color: #fff;
      border-radius: 20px;
      padding: 1px 8px;
      font-size: 0.6rem;
      font-weight: 700;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.3);
    }
    /* overlay actions (long press) */
    .photo-actions {
      position: absolute;
      top: 4px;
      right: 4px;
      display: none;
      gap: 4px;
      background: rgba(0, 0, 0, 0.6);
      padding: 4px 6px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
    }
    .photo-actions.show {
      display: flex;
    }
    .photo-actions button {
      background: none;
      border: none;
      color: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 12px;
      transition: 0.2s;
    }
    .photo-actions button:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    .photo-actions .pin-action {
      color: #fbbf24;
    }
    .photo-actions .unpin-action {
      color: #f87171;
    }

    /* ===== ADD PHOTO BTN ===== */
    .add-photo-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #3b82f6;
      color: #fff;
      font-size: 2rem;
      border: none;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
      cursor: pointer;
      transition: 0.2s;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .add-photo-btn:active {
      transform: scale(0.9);
    }

    /* ===== DRAWER ===== */
    .drawer {
      position: fixed;
      top: 0;
      right: -280px;
      width: 260px;
      height: 100%;
      background: #fff;
      box-shadow: -4px 0 20px rgba(0, 0, 0, 0.1);
      padding: 20px 16px;
      transition: 0.3s ease;
      z-index: 20;
      overflow-y: auto;
    }
    .drawer.open {
      right: 0;
    }
    .drawer-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      display: none;
      z-index: 19;
    }
    .drawer-backdrop.show {
      display: block;
    }
    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    .drawer-header h2 {
      font-size: 1.1rem;
    }
    .drawer-close {
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      color: #64748b;
    }
    .drawer-category {
      padding: 8px 12px;
      margin: 2px 0;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.15s;
      font-weight: 500;
      font-size: 0.95rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .drawer-category:hover {
      background: #f1f5f9;
    }
    .drawer-category.active {
      background: #dbeafe;
      color: #1e40af;
    }
    .drawer-footer {
      margin-top: 24px;
      border-top: 1px solid #e2e8f0;
      padding-top: 16px;
    }
    .drawer-footer button {
      background: none;
      border: none;
      color: #ef4444;
      font-weight: 600;
      cursor: pointer;
      padding: 8px 0;
      width: 100%;
      text-align: right;
      font-size: 0.95rem;
    }
    #ownerCategoryAdd {
      display: flex;
      gap: 6px;
      margin-top: 12px;
    }
    #ownerCategoryAdd input {
      flex: 1;
      padding: 6px 10px;
      border-radius: 20px;
      border: 1px solid #cbd5e1;
      font-size: 0.85rem;
    }
    #ownerCategoryAdd button {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 6px 14px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
    }

    /* ===== FULLSCREEN PHOTO MODAL ===== */
    .fullscreen-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.92);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 40;
      padding: 0;
      backdrop-filter: blur(8px);
    }
    .fullscreen-modal.open {
      display: flex;
    }
    .fullscreen-modal .modal-close {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 2rem;
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      cursor: pointer;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      z-index: 41;
    }
    .fullscreen-modal .modal-close:active {
      background: rgba(255,255,255,0.4);
    }
    .fullscreen-modal .fullscreen-image {
      max-width: 100%;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .fullscreen-modal .photo-info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      color: #fff;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 16px;
      backdrop-filter: blur(4px);
    }
    .fullscreen-modal .photo-info h3 {
      font-size: 1.1rem;
      margin-bottom: 4px;
    }
    .fullscreen-modal .photo-info p {
      font-size: 0.85rem;
      opacity: 0.9;
    }
    .fullscreen-modal .action-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .fullscreen-modal .action-row button {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 8px 20px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .fullscreen-modal .action-row button:active {
      background: rgba(255,255,255,0.3);
    }

    /* ===== AUTH ===== */
    .auth-container {
      max-width: 400px;
      margin: 40px auto;
      background: #fff;
      padding: 32px 24px;
      border-radius: 28px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      text-align: center;
    }
    .auth-container h2 {
      font-size: 1.5rem;
      margin-bottom: 16px;
    }
    .auth-container .input-group {
      text-align: right;
      margin-bottom: 12px;
    }
    .auth-container .input-group label {
      font-weight: 600;
      font-size: 0.85rem;
      display: block;
      margin-bottom: 4px;
    }
    .auth-container .input-group input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 0.95rem;
    }
    .auth-container .btn-primary {
      background: #3b82f6;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 30px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 8px;
    }
    .auth-container .btn-primary:active {
      background: #2563eb;
    }
    .auth-container .switch-link {
      color: #3b82f6;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .auth-container .switch-link:active {
      text-decoration: underline;
    }
    .auth-container .role-hint {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 6px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .gallery-grid {
        gap: 4px;
        padding: 4px;
      }
      .header h1 {
        font-size: 1rem;
      }
      .search-box {
        width: 90px;
        font-size: 0.75rem;
        padding: 4px 10px;
      }
      .search-box:focus {
        width: 110px;
      }
      .photo-card .photo-name {
        font-size: 0.6rem;
        padding: 2px 4px;
      }
      .fullscreen-modal .photo-info h3 {
        font-size: 0.95rem;
      }
      .fullscreen-modal .action-row button {
        padding: 6px 14px;
        font-size: 0.8rem;
      }
      .add-photo-btn {
        width: 48px;
        height: 48px;
        font-size: 1.8rem;
        bottom: 16px;
        right: 16px;
      }
    }
    @media (min-width: 600px) {
      .gallery-grid {
        gap: 8px;
        padding: 8px;
      }
    }
    /* landscape phone */
    @media (max-height: 500px) and (orientation: landscape) {
      .gallery-grid {
        grid-template-columns: repeat(6, 1fr);
        gap: 4px;
        padding: 4px;
      }
      .header {
        min-height: 44px;
        padding: 6px 12px;
      }
      .header h1 {
        font-size: 0.9rem;
      }
      .photo-card .photo-name {
        font-size: 0.5rem;
        padding: 1px 4px;
      }
      .fullscreen-modal .fullscreen-image {
        max-height: 70vh;
      }
    }
  </style>
</head>
<body>

  <!-- ==================== AUTH ==================== -->
  <div id="authContainer" class="auth-container">
    <h2>📸 گالری</h2>
    <p style="color:#64748b; margin-bottom:20px;">ورود / ثبت‌نام</p>

    <div id="loginForm">
      <div class="input-group">
        <label>نام کاربری</label>
        <input type="text" id="loginUsername" placeholder="نام خود را وارد کنید" />
      </div>
      <div class="input-group">
        <label>رمز عبور</label>
        <input type="password" id="loginPassword" placeholder="رمز عبور" />
      </div>
      <button id="loginBtn" class="btn-primary">ورود</button>
      <p style="margin-top:12px; font-size:0.9rem;">
        حساب ندارید؟ <span id="showRegister" class="switch-link">ثبت‌نام کنید</span>
      </p>
    </div>

    <div id="registerForm" class="hidden">
      <div class="input-group">
        <label>نام کاربری (یکتا)</label>
        <input type="text" id="registerUsername" placeholder="نام کاربری" />
      </div>
      <div class="input-group">
        <label>رمز عبور</label>
        <input type="password" id="registerPassword" placeholder="رمز عبور" />
      </div>
      <div class="input-group">
        <label>تکرار رمز عبور</label>
        <input type="password" id="registerPasswordConfirm" placeholder="تکرار رمز" />
      </div>
      <div class="input-group">
        <label>عکس پروفایل (اختیاری)</label>
        <input type="file" id="registerAvatar" accept="image/*" />
      </div>
      <p class="role-hint">اگر رمز <strong>1271390</strong> باشد، نقش <strong>مالک</strong> می‌گیرید.</p>
      <button id="registerBtn" class="btn-primary">ثبت‌نام</button>
      <p style="margin-top:12px; font-size:0.9rem;">
        قبلاً ثبت‌نام کرده‌اید؟ <span id="showLogin" class="switch-link">ورود</span>
      </p>
    </div>
  </div>

  <!-- ==================== MAIN APP ==================== -->
  <div id="mainApp" class="hidden" style="display:flex; flex-direction:column; height:100vh;">

    <header class="header">
      <h1>🖼️ گالری</h1>
      <div class="header-actions">
        <input type="text" id="searchInput" class="search-box" placeholder="جستجو..." />
        <img id="headerAvatar" class="user-avatar" src="" alt="avatar" />
        <button id="hamburgerBtn" class="hamburger">☰</button>
      </div>
    </header>

    <div class="gallery-grid" id="galleryGrid"></div>

    <button id="addPhotoBtn" class="add-photo-btn hidden">+</button>

    <!-- ========== DRAWER ========== -->
    <div id="drawerBackdrop" class="drawer-backdrop"></div>
    <div id="drawer" class="drawer">
      <div class="drawer-header">
        <h2>دسته‌بندی‌ها</h2>
        <button id="drawerCloseBtn" class="drawer-close">✕</button>
      </div>
      <div id="categoryList">
        <div class="drawer-category active" data-cat="all">همه</div>
      </div>
      <div id="ownerCategoryAdd" class="hidden">
        <input type="text" id="newCategoryInput" placeholder="نام دسته جدید" />
        <button id="addCategoryBtn">+ افزودن</button>
      </div>
      <div class="drawer-footer">
        <button id="logoutBtn">🚪 خروج</button>
      </div>
    </div>

    <!-- ========== FULLSCREEN PHOTO MODAL ========== -->
    <div id="photoModal" class="fullscreen-modal">
      <button class="modal-close" id="photoModalClose">✕</button>
      <img id="detailImage" class="fullscreen-image" src="" alt="photo" />
      <div class="photo-info">
        <h3 id="detailName"></h3>
        <p id="detailDesc"></p>
        <div class="action-row">
          <button id="shareBtn">📋 کپی لینک</button>
          <button id="downloadBtn">⬇️ دانلود</button>
        </div>
      </div>
    </div>

    <!-- ========== EDIT PHOTO MODAL (overlay) ========== -->
    <div id="editPhotoModal" class="fullscreen-modal" style="background: rgba(0,0,0,0.7);">
      <div style="background:#fff; max-width:400px; width:90%; border-radius:24px; padding:24px; position:relative; max-height:90vh; overflow-y:auto;">
        <button class="modal-close" id="editModalClose" style="position:absolute; top:8px; left:16px; font-size:1.8rem; background:none; border:none; color:#1e293b; cursor:pointer;">✕</button>
        <h2 id="editModalTitle" style="margin-bottom:16px;">افزودن عکس</h2>
        <input type="text" id="editPhotoName" placeholder="نام عکس" style="width:100%; padding:10px; border-radius:12px; border:1px solid #cbd5e1; margin-bottom:8px;" />
        <textarea id="editPhotoDesc" placeholder="توضیحات" style="width:100%; padding:10px; border-radius:12px; border:1px solid #cbd5e1; margin-bottom:8px; min-height:60px;"></textarea>
        <select id="editPhotoCategory" style="width:100%; padding:10px; border-radius:12px; border:1px solid #cbd5e1; margin-bottom:8px;">
          <option value="">بدون دسته</option>
        </select>
        <input type="file" id="editPhotoFile" accept="image/*" style="margin-bottom:8px;" />
        <button id="editPhotoSubmit" class="btn-primary" style="background:#3b82f6; color:#fff; border:none; padding:12px; border-radius:30px; font-weight:600; width:100%; cursor:pointer;">ذخیره</button>
        <input type="hidden" id="editPhotoId" />
      </div>
    </div>
  </div>

  <!-- ==================== JAVASCRIPT (IndexedDB) ==================== -->
  <script>
    (function() {
      'use strict';

      // ============ INDEXEDDB ============
      const DB_NAME = 'GalleryDB';
      const DB_VERSION = 2; // upgraded for pinned field

      function openDB() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, DB_VERSION);
          req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('users')) {
              db.createObjectStore('users', { keyPath: 'id', autoIncrement: true });
            }
            if (!db.objectStoreNames.contains('photos')) {
              const store = db.createObjectStore('photos', { keyPath: 'id', autoIncrement: true });
              store.createIndex('pinned', 'pinned', { unique: false });
            } else {
              // upgrade existing store
              const store = e.target.transaction.objectStore('photos');
              if (!store.indexNames.contains('pinned')) {
                store.createIndex('pinned', 'pinned', { unique: false });
              }
            }
            if (!db.objectStoreNames.contains('categories')) {
              db.createObjectStore('categories', { keyPath: 'id', autoIncrement: true });
            }
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }

      function dbAction(storeName, mode, callback) {
        return openDB().then(db => {
          return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, mode);
            const store = tx.objectStore(storeName);
            const req = callback(store);
            tx.oncomplete = () => resolve(req.result);
            tx.onerror = () => reject(tx.error);
          });
        });
      }

      function getAll(storeName) {
        return dbAction(storeName, 'readonly', store => store.getAll());
      }

      function add(storeName, data) {
        return dbAction(storeName, 'readwrite', store => store.add(data));
      }

      function put(storeName, data) {
        return dbAction(storeName, 'readwrite', store => store.put(data));
      }

      function remove(storeName, id) {
        return dbAction(storeName, 'readwrite', store => store.delete(id));
      }

      function getById(storeName, id) {
        return dbAction(storeName, 'readonly', store => store.get(id));
      }

      // ============ STATE ============
      let currentUser = null;
      let allPhotos = [];
      let allCategories = [];
      let filteredPhotos = [];
      let selectedCategory = 'all';
      let longPressTimer = null;

      // DOM refs
      const $ = id => document.getElementById(id);
      const authContainer = $('authContainer');
      const mainApp = $('mainApp');
      const loginForm = $('loginForm');
      const registerForm = $('registerForm');
      const loginUsername = $('loginUsername');
      const loginPassword = $('loginPassword');
      const loginBtn = $('loginBtn');
      const showRegister = $('showRegister');
      const registerUsername = $('registerUsername');
      const registerPassword = $('registerPassword');
      const registerPasswordConfirm = $('registerPasswordConfirm');
      const registerAvatar = $('registerAvatar');
      const registerBtn = $('registerBtn');
      const showLogin = $('showLogin');
      const headerAvatar = $('headerAvatar');
      const searchInput = $('searchInput');
      const galleryGrid = $('galleryGrid');
      const addPhotoBtn = $('addPhotoBtn');
      const hamburgerBtn = $('hamburgerBtn');
      const drawer = $('drawer');
      const drawerBackdrop = $('drawerBackdrop');
      const drawerCloseBtn = $('drawerCloseBtn');
      const categoryList = $('categoryList');
      const ownerCategoryAdd = $('ownerCategoryAdd');
      const newCategoryInput = $('newCategoryInput');
      const addCategoryBtn = $('addCategoryBtn');
      const logoutBtn = $('logoutBtn');
      const photoModal = $('photoModal');
      const photoModalClose = $('photoModalClose');
      const detailImage = $('detailImage');
      const detailName = $('detailName');
      const detailDesc = $('detailDesc');
      const shareBtn = $('shareBtn');
      const downloadBtn = $('downloadBtn');
      const editPhotoModal = $('editPhotoModal');
      const editModalClose = $('editModalClose');
      const editModalTitle = $('editModalTitle');
      const editPhotoName = $('editPhotoName');
      const editPhotoDesc = $('editPhotoDesc');
      const editPhotoCategory = $('editPhotoCategory');
      const editPhotoFile = $('editPhotoFile');
      const editPhotoSubmit = $('editPhotoSubmit');
      const editPhotoId = $('editPhotoId');

      // ============ UI HELPERS ============
      function showAuth() {
        authContainer.classList.remove('hidden');
        mainApp.classList.add('hidden');
      }

      function showApp() {
        authContainer.classList.add('hidden');
        mainApp.classList.remove('hidden');
      }

      function closeDrawer() {
        drawer.classList.remove('open');
        drawerBackdrop.classList.remove('show');
      }

      function openDrawer() {
        drawer.classList.add('open');
        drawerBackdrop.classList.add('show');
      }

      function closeAllModals() {
        photoModal.classList.remove('open');
        editPhotoModal.classList.remove('open');
      }

      function showToast(msg) {
        alert(msg);
      }

      // ============ AUTH ============
      function checkSession() {
        const saved = sessionStorage.getItem('gallery_user');
        if (saved) {
          try {
            const user = JSON.parse(saved);
            currentUser = user;
            headerAvatar.src = user.avatar || '';
            showApp();
            loadData();
            return true;
          } catch (e) { /* ignore */ }
        }
        return false;
      }

      async function handleLogin() {
        const username = loginUsername.value.trim();
        const password = loginPassword.value.trim();
        if (!username || !password) {
          showToast('لطفاً نام کاربری و رمز را وارد کنید.');
          return;
        }
        try {
          const users = await getAll('users');
          const found = users.find(u => u.username === username);
          if (!found) {
            showToast('کاربری با این نام پیدا نشد.');
            return;
          }
          if (found.password !== password) {
            showToast('رمز عبور اشتباه است.');
            return;
          }
          currentUser = found;
          sessionStorage.setItem('gallery_user', JSON.stringify(found));
          headerAvatar.src = found.avatar || '';
          showApp();
          loadData();
        } catch (err) {
          showToast('خطا در ورود: ' + err.message);
        }
      }

      async function handleRegister() {
        const username = registerUsername.value.trim();
        const password = registerPassword.value.trim();
        const confirm = registerPasswordConfirm.value.trim();
        const avatarFile = registerAvatar.files[0];

        if (!username || !password || !confirm) {
          showToast('تمامی فیلدها را پر کنید.');
          return;
        }
        if (password !== confirm) {
          showToast('رمز عبور و تکرار آن مطابقت ندارند.');
          return;
        }

        try {
          const users = await getAll('users');
          if (users.find(u => u.username === username)) {
            showToast('این نام کاربری قبلاً ثبت شده است.');
            return;
          }

          let avatarBase64 = '';
          if (avatarFile) {
            avatarBase64 = await readFileAsBase64(avatarFile);
          }

          const role = (password === '1271390') ? 'owner' : 'user';
          const newUser = {
            username,
            password,
            role,
            avatar: avatarBase64,
            createdAt: Date.now()
          };
          const id = await add('users', newUser);
          const savedUser = { ...newUser, id };
          currentUser = savedUser;
          sessionStorage.setItem('gallery_user', JSON.stringify(savedUser));
          headerAvatar.src = savedUser.avatar || '';
          showApp();
          loadData();
        } catch (err) {
          showToast('خطا در ثبت‌نام: ' + err.message);
        }
      }

      function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function logout() {
        sessionStorage.removeItem('gallery_user');
        currentUser = null;
        showAuth();
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
      }

      // ============ DATA LOADING ============
      async function loadData() {
        try {
          allCategories = await getAll('categories');
          allPhotos = await getAll('photos');
          // sort: pinned first, then by createdAt descending
          allPhotos.sort((a, b) => {
            if (a.pinned && !b.pinned) return -1;
            if (!a.pinned && b.pinned) return 1;
            return (b.createdAt || 0) - (a.createdAt || 0);
          });
          applyFilters();
          renderCategories();
          renderPhotos();
          if (currentUser && currentUser.role === 'owner') {
            addPhotoBtn.classList.remove('hidden');
            ownerCategoryAdd.classList.remove('hidden');
          } else {
            addPhotoBtn.classList.add('hidden');
            ownerCategoryAdd.classList.add('hidden');
          }
        } catch (err) {
          showToast('خطا در بارگذاری داده: ' + err.message);
        }
      }

      function applyFilters() {
        let filtered = [...allPhotos];
        if (selectedCategory !== 'all') {
          filtered = filtered.filter(p => p.categoryId === selectedCategory);
        }
        const query = searchInput.value.trim().toLowerCase();
        if (query) {
          filtered = filtered.filter(p =>
            (p.name && p.name.toLowerCase().includes(query)) ||
            (p.description && p.description.toLowerCase().includes(query))
          );
        }
        filteredPhotos = filtered;
        renderPhotos();
      }

      // ============ RENDER ============
      function renderPhotos() {
        if (filteredPhotos.length === 0) {
          galleryGrid.innerHTML =
            `<p style="grid-column:1/-1;text-align:center;color:#94a3b8;padding:40px 0;font-size:0.9rem;">هیچ عکسی یافت نشد.</p>`;
          return;
        }
        let html = '';
        filteredPhotos.forEach(photo => {
          const pinnedBadge = photo.pinned ? `<span class="pin-badge">📌 پین</span>` : '';
          html += `
            <div class="photo-card" data-id="${photo.id}" data-url="${photo.imageData}" data-name="${photo.name || ''}" data-desc="${photo.description || ''}">
              <img src="${photo.imageData}" alt="${photo.name || 'عکس'}" loading="lazy" />
              ${pinnedBadge}
              <div class="photo-name">${photo.name || 'بدون نام'}</div>
              <div class="photo-actions" data-id="${photo.id}">
                <button class="pin-action" data-id="${photo.id}">📌 پین</button>
                <button class="unpin-action" data-id="${photo.id}">🔓 برداشتن</button>
                <button class="edit-action" data-id="${photo.id}">✏️</button>
                <button class="delete-action" data-id="${photo.id}">🗑️</button>
              </div>
            </div>
          `;
        });
        galleryGrid.innerHTML = html;
        attachPhotoEvents();
      }

      function renderCategories() {
        let html = `<div class="drawer-category ${selectedCategory === 'all' ? 'active' : ''}" data-cat="all">همه</div>`;
        allCategories.forEach(cat => {
          const active = selectedCategory === cat.id ? 'active' : '';
          html += `<div class="drawer-category ${active}" data-cat="${cat.id}">${cat.name}</div>`;
        });
        categoryList.innerHTML = html;

        categoryList.querySelectorAll('.drawer-category').forEach(el => {
          el.addEventListener('click', () => {
            selectedCategory = el.dataset.cat;
            applyFilters();
            renderCategories();
            closeDrawer();
          });
        });

        const select = editPhotoCategory;
        select.innerHTML = '<option value="">بدون دسته</option>';
        allCategories.forEach(cat => {
          select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
        });
      }

      // ============ PHOTO EVENTS ============
      function attachPhotoEvents() {
        galleryGrid.removeEventListener('mousedown', onPhotoMouseDown);
        galleryGrid.removeEventListener('mouseup', onPhotoMouseUp);
        galleryGrid.removeEventListener('mouseleave', onPhotoMouseLeave);
        galleryGrid.removeEventListener('click', onPhotoClick);
        galleryGrid.addEventListener('mousedown', onPhotoMouseDown);
        galleryGrid.addEventListener('mouseup', onPhotoMouseUp);
        galleryGrid.addEventListener('mouseleave', onPhotoMouseLeave);
        galleryGrid.addEventListener('click', onPhotoClick);

        galleryGrid.removeEventListener('touchstart', onTouchStart);
        galleryGrid.removeEventListener('touchend', onTouchEnd);
        galleryGrid.removeEventListener('touchmove', onTouchMove);
        galleryGrid.addEventListener('touchstart', onTouchStart);
        galleryGrid.addEventListener('touchend', onTouchEnd);
        galleryGrid.addEventListener('touchmove', onTouchMove);
      }

      function getPhotoCard(el) {
        while (el && !el.classList.contains('photo-card')) el = el.parentElement;
        return el;
      }

      let mouseTimer = null;

      function onPhotoMouseDown(e) {
        const card = getPhotoCard(e.target);
        if (!card) return;
        mouseTimer = setTimeout(() => {
          showPhotoActions(card);
        }, 2000);
      }

      function onPhotoMouseUp(e) {
        clearTimeout(mouseTimer);
      }

      function onPhotoMouseLeave(e) {
        clearTimeout(mouseTimer);
      }

      let touchTimer = null;

      function onTouchStart(e) {
        const touch = e.touches[0];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        const card = getPhotoCard(el);
        if (!card) return;
        touchTimer = setTimeout(() => {
          showPhotoActions(card);
        }, 2000);
      }

      function onTouchEnd(e) {
        clearTimeout(touchTimer);
      }

      function onTouchMove(e) {
        clearTimeout(touchTimer);
      }

      function showPhotoActions(card) {
        const actions = card.querySelector('.photo-actions');
        if (!actions) return;
        if (!currentUser || currentUser.role !== 'owner') return;
        actions.classList.add('show');
        setTimeout(() => actions.classList.remove('show'), 5000);
      }

      function onPhotoClick(e) {
        const card = getPhotoCard(e.target);
        if (!card) return;
        if (e.target.closest('.photo-actions')) {
          return;
        }
        const url = card.dataset.url;
        const name = card.dataset.name;
        const desc = card.dataset.desc;
        if (url) {
          detailImage.src = url;
          detailName.textContent = name || 'بدون نام';
          detailDesc.textContent = desc || '';
          photoModal.classList.add('open');
        }
      }

      // Action buttons delegation
      galleryGrid.addEventListener('click', async (e) => {
        const pinBtn = e.target.closest('.pin-action');
        if (pinBtn) {
          e.stopPropagation();
          const id = Number(pinBtn.dataset.id);
          await togglePin(id, true);
          return;
        }
        const unpinBtn = e.target.closest('.unpin-action');
        if (unpinBtn) {
          e.stopPropagation();
          const id = Number(unpinBtn.dataset.id);
          await togglePin(id, false);
          return;
        }
        const editBtn = e.target.closest('.edit-action');
        if (editBtn) {
          e.stopPropagation();
          const id = Number(editBtn.dataset.id);
          openEditPhoto(id);
          return;
        }
        const deleteBtn = e.target.closest('.delete-action');
        if (deleteBtn) {
          e.stopPropagation();
          const id = Number(deleteBtn.dataset.id);
          if (confirm('آیا از حذف این عکس اطمینان دارید؟')) {
            await deletePhoto(id);
          }
          return;
        }
      });

      // ============ PIN TOGGLE ============
      async function togglePin(photoId, pinned) {
        if (!currentUser || currentUser.role !== 'owner') return;
        try {
          const photo = allPhotos.find(p => p.id === photoId);
          if (!photo) return;
          photo.pinned = pinned;
          await put('photos', photo);
          showToast(pinned ? 'عکس پین شد.' : 'پین برداشته شد.');
          loadData();
        } catch (err) {
          showToast('خطا: ' + err.message);
        }
      }

      // ============ PHOTO CRUD ============
      addPhotoBtn.addEventListener('click', () => {
        if (!currentUser || currentUser.role !== 'owner') return;
        openEditPhoto(null);
      });

      function openEditPhoto(photoId) {
        if (!currentUser || currentUser.role !== 'owner') return;
        const isEdit = photoId !== null && photoId !== undefined;
        editModalTitle.textContent = isEdit ? 'ویرایش عکس' : 'افزودن عکس جدید';
        editPhotoId.value = photoId || '';
        if (isEdit) {
          const photo = allPhotos.find(p => p.id === photoId);
          if (!photo) return;
          editPhotoName.value = photo.name || '';
          editPhotoDesc.value = photo.description || '';
          editPhotoCategory.value = photo.categoryId || '';
          editPhotoFile.value = '';
        } else {
          editPhotoName.value = '';
          editPhotoDesc.value = '';
          editPhotoCategory.value = '';
          editPhotoFile.value = '';
        }
        editPhotoModal.classList.add('open');
      }

      editPhotoSubmit.addEventListener('click', async () => {
        const id = Number(editPhotoId.value) || null;
        const name = editPhotoName.value.trim();
        const desc = editPhotoDesc.value.trim();
        const categoryId = editPhotoCategory.value || '';
        const file = editPhotoFile.files[0];

        if (!name) {
          showToast('لطفاً نام عکس را وارد کنید.');
          return;
        }

        try {
          let imageData = '';
          if (file) {
            imageData = await readFileAsBase64(file);
          } else if (id) {
            const old = allPhotos.find(p => p.id === id);
            if (old) imageData = old.imageData;
          }

          if (!imageData && !id) {
            showToast('لطفاً یک عکس انتخاب کنید.');
            return;
          }

          const data = {
            name,
            description: desc,
            categoryId: categoryId || '',
            imageData,
            updatedAt: Date.now()
          };

          if (id) {
            data.id = id;
            if (!data.imageData) {
              const old = allPhotos.find(p => p.id === id);
              if (old) data.imageData = old.imageData;
            }
            // preserve pinned status
            const oldPhoto = allPhotos.find(p => p.id === id);
            if (oldPhoto) data.pinned = oldPhoto.pinned || false;
            await put('photos', data);
            showToast('عکس ویرایش شد.');
          } else {
            data.createdAt = Date.now();
            data.uploadedBy = currentUser.username;
            data.pinned = false;
            await add('photos', data);
            showToast('عکس جدید افزوده شد.');
          }
          closeAllModals();
          loadData();
        } catch (err) {
          showToast('خطا: ' + err.message);
        }
      });

      async function deletePhoto(photoId) {
        if (!currentUser || currentUser.role !== 'owner') return;
        try {
          await remove('photos', photoId);
          showToast('عکس حذف شد.');
          loadData();
        } catch (err) {
          showToast('خطا در حذف: ' + err.message);
        }
      }

      // ============ CATEGORY CRUD ============
      addCategoryBtn.addEventListener('click', async () => {
        if (!currentUser || currentUser.role !== 'owner') return;
        const name = newCategoryInput.value.trim();
        if (!name) {
          showToast('لطفاً نام دسته را وارد کنید.');
          return;
        }
        try {
          await add('categories', {
            name,
            createdBy: currentUser.username,
            createdAt: Date.now()
          });
          newCategoryInput.value = '';
          showToast('دسته جدید افزوده شد.');
          loadData();
        } catch (err) {
          showToast('خطا: ' + err.message);
        }
      });

      // ============ MODAL CONTROLS ============
      photoModalClose.addEventListener('click', () => photoModal.classList.remove('open'));
      editModalClose.addEventListener('click', () => editPhotoModal.classList.remove('open'));
      photoModal.addEventListener('click', (e) => {
        if (e.target === photoModal) photoModal.classList.remove('open');
      });
      editPhotoModal.addEventListener('click', (e) => {
        if (e.target === editPhotoModal) editPhotoModal.classList.remove('open');
      });

      // ============ SHARE & DOWNLOAD ============
      shareBtn.addEventListener('click', () => {
        const url = detailImage.src;
        if (!url) return;
        // Copy a shareable text (including name)
        const text = `🖼️ ${detailName.textContent}\n${detailDesc.textContent}\n${url}`;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(text).then(() => {
            showToast('متن کپی شد! قابل ارسال در برنامه‌ها');
          }).catch(() => {
            fallbackCopy(text);
          });
        } else {
          fallbackCopy(text);
        }
      });

      function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          showToast('متن کپی شد!');
        } catch (e) {
          showToast('کپی نشد، لطفاً دستی کپی کنید.');
        }
        document.body.removeChild(textarea);
      }

      downloadBtn.addEventListener('click', async () => {
        const url = detailImage.src;
        if (!url) return;
        try {
          const resp = await fetch(url);
          const blob = await resp.blob();
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = detailName.textContent || 'photo';
          a.click();
          URL.revokeObjectURL(a.href);
        } catch {
          showToast('دانلود ممکن نیست.');
        }
      });

      // ============ SEARCH ============
      searchInput.addEventListener('input', applyFilters);

      // ============ DRAWER ============
      hamburgerBtn.addEventListener('click', openDrawer);
      drawerCloseBtn.addEventListener('click', closeDrawer);
      drawerBackdrop.addEventListener('click', closeDrawer);

      // ============ AUTH UI SWITCH ============
      showRegister.addEventListener('click', () => {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
      });
      showLogin.addEventListener('click', () => {
        registerForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
      });

      loginBtn.addEventListener('click', handleLogin);
      registerBtn.addEventListener('click', handleRegister);
      logoutBtn.addEventListener('click', logout);

      // ============ INIT ============
      if (!checkSession()) {
        showAuth();
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          if (!loginForm.classList.contains('hidden')) handleLogin();
          else if (!registerForm.classList.contains('hidden')) handleRegister();
        }
      });

      console.log('✅ گالری موبایل با پین و تمام‌صفحه');
    })();
  </script>
</body>
  </html>
